<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Balloon Artist & Decorative Arch Studio | 404 Not Found</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.2s ease, border-color 0.2s ease, transform 0.2s;
      max-width: 100%;
      overflow-wrap: break-word;
    }

    :root {
      --bg-primary: #0c0b14;
      --bg-secondary: #05040a;
      --surface-glass: rgba(20, 18, 30, 0.6);
      --text-primary: #f0eef7;
      --text-secondary: #ccc9e6;
      --text-muted: #8f8ba8;
      --border-lux: rgba(255, 255, 255, 0.12);
      --accent-gold: #ff7eb3;
      --accent-terracotta: #ff758c;
      --accent-gradient: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
      --icon-hover-bg: rgba(255, 126, 179, 0.1);
    }

    body.dark {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --surface-glass: rgba(0, 0, 0, 0.8);
      --text-primary: #f0eef7;
      --text-secondary: #ccc9e6;
      --text-muted: #8f8ba8;
      --border-lux: rgba(255, 255, 255, 0.12);
      --accent-gold: #ff7eb3;
      --accent-terracotta: #ff758c;
      background-color: #000000 !important;
      background-image: none !important;
    }

    body {
      font-family: 'Sora', sans-serif;
      background-color: var(--bg-primary);
      background-image: radial-gradient(circle at 0% 30%, #110e1c, #05040a);
      color: var(--text-primary);
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .floating-orb {
      position: absolute;
      background: radial-gradient(circle, rgba(255, 200, 220, 0.4) 0%, rgba(255, 105, 180, 0.1) 80%);
      border-radius: 50%;
      filter: blur(25px);
      pointer-events: none;
      z-index: 0;
    }

    /* Top Controls */
    .top-controls {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.8rem;
      z-index: 100;
    }

    .icon-btn {
      background: rgba(20, 18, 30, 0.6);
      border: 1px solid var(--border-lux);
      color: var(--text-primary);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: var(--icon-hover-bg);
      border-color: var(--accent-terracotta);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    /* Error Section */
    .error-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .error-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(8rem, 20vw, 15rem);
      line-height: 1;
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      animation: float 6s ease-in-out infinite;
      display: inline-block;
    }

    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .error-subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    .btn-premium {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      color: #0c0b14;
      font-weight: 700;
      padding: 1.1rem 2.8rem;
      border-radius: 80px;
      border: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-premium:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    /* RTL specific adjustment for controls */
    body[dir="rtl"] .top-controls {
      right: auto;
      left: 1.5rem;
    }

  </style>
</head>
<body dir="ltr">

  <!-- Background decorations -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0;">
    <div class="floating-orb" style="width: min(450px, 80vw); height: min(450px, 80vw); top: 10%; left: 10%; background: radial-gradient(circle, #ffb3d1, #ff6f91); filter: blur(90px); opacity: 0.2;"></div>
    <div class="floating-orb" style="width: min(350px, 70vw); height: min(350px, 70vw); bottom: 10%; right: 10%; background: radial-gradient(circle, #b77eff, #8f5eff); filter: blur(80px); opacity: 0.2;"></div>
  </div>

  <!-- Minimal Controls -->
  <div class="top-controls">
    <button class="icon-btn" id="rtlToggleBtn" aria-label="Toggle RTL">
      <i class="fa-solid fa-right-left"></i>
    </button>
    <button class="icon-btn" id="darkToggleBtn" aria-label="Toggle Theme">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <!-- 404 Main Content -->
  <div class="error-container">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Oops! This balloon floated away.</h1>
      <p class="error-subtitle">
        We can't seem to find the page you're looking for. It might have been moved, deleted, or never existed in the first place. Let's get you back to the celebration.
      </p>
      <a href="index.html" class="btn-premium">
        <i class="fas fa-home"></i> Return Home
      </a>
    </div>
  </div>

  <script>
    (function(){
      const body = document.body;
      const darkToggleBtn = document.getElementById('darkToggleBtn');
      const darkIcon = darkToggleBtn?.querySelector('i');
      const rtlToggleBtn = document.getElementById('rtlToggleBtn');
      const rtlIcon = rtlToggleBtn?.querySelector('i');

      function setDarkMode(isDark) {
        if(isDark) {
          body.classList.add('dark');
          localStorage.setItem('balloonTheme', 'dark');
        } else {
          body.classList.remove('dark');
          localStorage.setItem('balloonTheme', 'light');
        }
        if(darkIcon) darkIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      }
      const savedTheme = localStorage.getItem('balloonTheme');
      if(savedTheme === 'dark') setDarkMode(true);
      else if(savedTheme === 'light') setDarkMode(false);
      else setDarkMode(window.matchMedia('(prefers-color-scheme: dark)').matches);
      if(darkToggleBtn) darkToggleBtn.addEventListener('click', () => setDarkMode(!body.classList.contains('dark')));

      function setDirection(dir) {
        document.documentElement.setAttribute('dir', dir);
        body.setAttribute('dir', dir);
        localStorage.setItem('balloonDir', dir);
        if(rtlIcon) rtlIcon.style.transform = dir === 'rtl' ? 'scaleX(-1)' : 'scaleX(1)';
      }
      const savedDir = localStorage.getItem('balloonDir');
      setDirection(savedDir === 'rtl' ? 'rtl' : 'ltr');
      if(rtlToggleBtn) rtlToggleBtn.addEventListener('click', () => setDirection(document.documentElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'));

      const floatingElements = document.querySelectorAll('.floating-orb');
      function animateOrbs() {
        floatingElements.forEach((orb, idx) => {
          let moveX = (Math.sin(Date.now() * 0.001 * (idx+1)) * 12);
          let moveY = (Math.cos(Date.now() * 0.0012 * (idx+1)) * 10);
          orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
        requestAnimationFrame(animateOrbs);
      }
      if(floatingElements.length) requestAnimationFrame(animateOrbs);
    })();
  </script>
</body>
</html>
