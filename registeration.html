<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Balloon Artist & Decorative Arch Studio | Register</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.2s ease, border-color 0.2s ease, transform 0.2s;
      max-width: 100%;
      overflow-wrap: break-word;
    }

    :root {
      --bg-primary: #0c0b14;
      --bg-secondary: #05040a;
      --surface-glass: rgba(20, 18, 30, 0.6);
      --text-primary: #f0eef7;
      --text-secondary: #ccc9e6;
      --text-muted: #8f8ba8;
      --border-lux: rgba(255, 255, 255, 0.12);
      --accent-gold: #ff7eb3;
      --accent-terracotta: #ff758c;
      --btn-outline: #ff7eb3;
    }

    body.dark {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --surface-glass: rgba(0, 0, 0, 0.8);
      --text-primary: #f0eef7;
      --text-secondary: #ccc9e6;
      --text-muted: #8f8ba8;
      --border-lux: rgba(255, 255, 255, 0.12);
      --accent-gold: #ff7eb3;
      --accent-terracotta: #ff758c;
      background-color: #000000 !important;
      background-image: none !important;
    }

    body {
      font-family: 'Sora', sans-serif;
      background-color: #0c0b14;
      background-image: radial-gradient(circle at 0% 30%, #110e1c, #05040a);
      color: #f0eef7;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      position: relative;
    }

    /* Floating orbs */
    .floating-orb {
      position: absolute;
      background: radial-gradient(circle, rgba(255, 200, 220, 0.4) 0%, rgba(255, 105, 180, 0.1) 80%);
      border-radius: 50%;
      filter: blur(25px);
      pointer-events: none;
      z-index: 0;
    }

    /* Top right controls */
    .top-controls {
      position: absolute;
      top: 2rem;
      right: 2rem;
      display: flex;
      gap: 1rem;
      z-index: 100;
    }

    .icon-btn {
      background: rgba(20, 18, 30, 0.6);
      border: 1px solid var(--border-lux);
      color: var(--text-primary);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      border-color: var(--accent-terracotta);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    /* Registration specific styles */
    .login-page-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
    }
    .login-card {
      width: 100%;
      max-width: 450px;
      background: rgba(20, 18, 30, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-lux);
      border-radius: 40px;
      padding: 4rem 3rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }
    
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF, #FFC0CB, #FFB3D9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(255, 105, 180, 0.3);
      display: block;
      margin-bottom: 2rem;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .login-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .login-form input {
      width: 100%;
      padding: 1.2rem 1.5rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-lux);
      border-radius: 15px;
      color: var(--text-primary);
      font-family: 'Sora', sans-serif;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }
    .login-form input:focus {
      border-color: var(--accent-terracotta);
      background: rgba(255,255,255,0.05);
    }

    .btn-premium {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-terracotta));
      color: #000;
      font-weight: 600;
      padding: 1.2rem;
      border-radius: 40px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 1rem;
    }
    .btn-premium:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
    }

    .login-divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-lux);
    }
    .login-divider::before { margin-right: 15px; }
    .login-divider::after { margin-left: 15px; }
    
    .social-login-grid {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }
    .social-login-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-lux);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.3s;
    }
    .social-login-btn:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.1);
      border-color: var(--accent-terracotta);
      color: var(--accent-gold);
    }
  </style>

  <style id="global-responsive-fixes">
    /* Standardized Global Padding Token */
    :root {
      --global-padding-x: clamp(1rem, 5vw, 4rem);
    }

    /* 3. Base interior containers get exactly ONE layer of perfect padding */
    .container-custom, 
    .nav-container, 
    .footer-container {
       padding-left: var(--global-padding-x) !important;
       padding-right: var(--global-padding-x) !important;
       max-width: 100% !important;
       margin-left: auto !important;
       margin-right: auto !important;
       width: 100% !important;
       box-sizing: border-box !important;
    }

    /* 4. Sections without container-custom, and standalone wrappers get padding */
    section:not(:has(.container-custom)),
    .login-page-container,
    .grid-portfolio,
    .h2-cta-wrapper {
       padding-left: var(--global-padding-x) !important;
       padding-right: var(--global-padding-x) !important;
       box-sizing: border-box !important;
       width: 100% !important;
    }

    /* 5. Wrappers that contain a padded container get zero padding themselves to avoid doubling */
    section:has(.container-custom),
    nav, footer, .navbar {
       padding-left:  0 !important;
       padding-right:  0 !important;
    }

    /* Exception: horizontal scroll section must bleed right */
    section.h2-collections {
       padding-right: 0 !important;
       padding-left: var(--global-padding-x) !important;
    }
    
    /* 6. Responsive flexible layouts (Mobile/Tablet optimizations) */
    img, video, iframe {
       max-width: 100% !important;
       height: auto;
    }
    
    .floating-orb {
       max-width: 100vw;
       overflow: hidden;
    }

    /* Generic Flex/Grid fixes for inline styles to ensure stacking */
    @media (max-width: 1024px) {
       .hero-section, .grid-portfolio, .footer-container {
         text-align: center;
       }
       .hero-title { font-size: clamp(2.5rem, 8vw, 4rem) !important; }
       .responsive-flex { justify-content: center !important; }
       .btn-premium { margin-left: auto; margin-right: auto; }
    }

    @media (max-width: 768px) {
       h2, .display-head { font-size: clamp(2rem, 7vw, 2.8rem) !important; }
       .studio-card { padding: 2rem 1.5rem !important; border-radius: 32px !important; }
       .final-cta { margin: 2rem 1rem !important; padding: 3rem 1rem !important; }
       .login-card { padding: 3rem 1.5rem !important; border-radius: 32px !important; }
       .login-title { font-size: clamp(2rem, 8vw, 2.8rem) !important; }
    }
  </style>

</head>
<body>
  
  <!-- Background orbs wrapped in a dedicated hidden-overflow container -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0;">
    <div class="floating-orb" style="width: min(350px, 60vw); height: min(350px, 60vw); top: -80px; left: -2%; background: radial-gradient(circle, #ffb3d1, #ff6f91); filter: blur(70px);"></div>
    <div class="floating-orb" style="width: min(250px, 50vw); height: min(250px, 50vw); bottom: 20%; right: -5%; background: radial-gradient(circle, #b77eff, #8f5eff); filter: blur(65px);"></div>
  </div>
  
  <div class="top-controls">
    <button class="icon-btn" id="rtlToggleBtn" aria-label="Toggle RTL">
      <i class="fa-solid fa-right-left"></i>
    </button>
    <button class="icon-btn" id="darkToggleBtn" aria-label="Toggle Theme">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <div class="login-page-container">
    <div class="login-card">
      <a href="index.html" style="text-decoration: none;">
        <span class="logo-text">🎈 Arch & Balloon</span>
      </a>
      
      <h1 class="login-title">Create Account</h1>
      <p class="login-subtitle">Join us to start planning your event.</p>
      
      <form class="login-form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        
        <div style="position: relative; margin-bottom: 1.2rem;">
          <input type="password" id="regPassword" placeholder="Password" required style="margin-bottom: 0; padding-right: 3rem;">
          <i class="fas fa-eye toggle-password" id="toggleRegPasswordIcon" style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='var(--accent-gold)'" onmouseout="this.style.color='var(--text-muted)'"></i>
        </div>

        <div style="position: relative; margin-bottom: 1.2rem;">
          <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required style="margin-bottom: 0; padding-right: 3rem;">
          <i class="fas fa-eye toggle-password" id="toggleRegConfirmPasswordIcon" style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='var(--accent-gold)'" onmouseout="this.style.color='var(--text-muted)'"></i>
        </div>
        
        <button type="button" class="btn-premium">Sign Up</button>
      </form>
      
      <div class="login-divider">Or continue with</div>
      
      <div class="social-login-grid">
        <a href="#" class="social-login-btn" aria-label="Sign Up with Google"><i class="fab fa-google"></i></a>
        <a href="#" class="social-login-btn" aria-label="Sign Up with Apple"><i class="fab fa-apple"></i></a>
        <a href="#" class="social-login-btn" aria-label="Sign Up with Facebook"><i class="fab fa-facebook-f"></i></a>
      </div>
      
      <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
        Already have an account? <a href="login.html" style="color: var(--accent-gold); text-decoration: none; font-weight: 600;">Sign In</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      const html = document.documentElement;
      
      // Dark Mode Logic
      const darkToggleBtn = document.getElementById('darkToggleBtn');
      const darkIcon = darkToggleBtn.querySelector('i');
      
      function setDarkMode(isDark) {
        if(isDark) {
          body.classList.add('dark');
          localStorage.setItem('balloonTheme', 'dark');
          darkIcon.classList.remove('fa-moon');
          darkIcon.classList.add('fa-sun');
        } else {
          body.classList.remove('dark');
          localStorage.setItem('balloonTheme', 'light');
          darkIcon.classList.remove('fa-sun');
          darkIcon.classList.add('fa-moon');
        }
      }
      
      const savedTheme = localStorage.getItem('balloonTheme');
      if (savedTheme === 'dark') setDarkMode(true);
      else if (savedTheme === 'light') setDarkMode(false);
      else setDarkMode(window.matchMedia('(prefers-color-scheme: dark)').matches);
      
      darkToggleBtn.addEventListener('click', () => {
        setDarkMode(!body.classList.contains('dark'));
      });

      // RTL Logic
      const rtlToggleBtn = document.getElementById('rtlToggleBtn');
      const rtlIcon = rtlToggleBtn.querySelector('i');
      
      function setDirection(dir) {
        html.setAttribute('dir', dir);
        body.setAttribute('dir', dir);
        localStorage.setItem('balloonDir', dir);
        rtlIcon.style.transform = dir === 'rtl' ? 'scaleX(-1)' : 'scaleX(1)';
      }
      
      const savedDir = localStorage.getItem('balloonDir');
      setDirection(savedDir === 'rtl' ? 'rtl' : 'ltr');
      
      rtlToggleBtn.addEventListener('click', () => {
        setDirection(html.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl');
      });
      
      // Toggle Password Visibility (Main Password)
      const toggleRegPasswordIcon = document.getElementById('toggleRegPasswordIcon');
      const regPasswordInput = document.getElementById('regPassword');
      
      toggleRegPasswordIcon.addEventListener('click', () => {
        const type = regPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        regPasswordInput.setAttribute('type', type);
        
        if(type === 'password') {
          toggleRegPasswordIcon.classList.remove('fa-eye-slash');
          toggleRegPasswordIcon.classList.add('fa-eye');
        } else {
          toggleRegPasswordIcon.classList.remove('fa-eye');
          toggleRegPasswordIcon.classList.add('fa-eye-slash');
        }
      });

      // Toggle Password Visibility (Confirm Password)
      const toggleRegConfirmPasswordIcon = document.getElementById('toggleRegConfirmPasswordIcon');
      const regConfirmPasswordInput = document.getElementById('regConfirmPassword');
      
      toggleRegConfirmPasswordIcon.addEventListener('click', () => {
        const type = regConfirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        regConfirmPasswordInput.setAttribute('type', type);
        
        if(type === 'password') {
          toggleRegConfirmPasswordIcon.classList.remove('fa-eye-slash');
          toggleRegConfirmPasswordIcon.classList.add('fa-eye');
        } else {
          toggleRegConfirmPasswordIcon.classList.remove('fa-eye');
          toggleRegConfirmPasswordIcon.classList.add('fa-eye-slash');
        }
      });

      // Floating Orbs Animation
      const floatingElements = document.querySelectorAll('.floating-orb');
      setInterval(() => {
        floatingElements.forEach((orb, idx) => {
          let moveX = (Math.sin(Date.now() * 0.001 * (idx+1)) * 8);
          let moveY = (Math.cos(Date.now() * 0.0012 * (idx+1)) * 6);
          orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
      }, 100);
    });
  </script>
</body>
</html>
